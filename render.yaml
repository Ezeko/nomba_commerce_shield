services:
  - type: web
    name: nomba-commerce-shield
    env: docker
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: storage/database/database.sqlite
      # Nomba credentials should be set manually in the Render Dashboard under Environment Variables
